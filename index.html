<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumzy</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.png">
</head>
<body>
    <div id="root">
        <div class="login-page" id="login-page">
            <div class="auth-card" id="auth-container">
                <h1 class="auth-title">Create <span style="color: rgb(72, 168, 203);">Tumzy</span> Account</h1>
                <p class="auth-subtitle">Join our amazing community today!</p>
                
                <div class="auth-form-group">
                    <input type="email" class="auth-input" id="email" placeholder="Email" required>
                    <input type="password" class="auth-input" id="password" placeholder="Password" required>
                </div>

                <div class="auth-action-group">
                    <button id="signup-btn" class="auth-btn auth-btn-primary">Sign Up</button>
                    <button id="login-btn" class="auth-btn auth-btn-outline">Login</button>
                </div>
            </div>
        </div> 
        <div class="chat-layout">
            <button class="hamburger">☰</button>
            
            <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">Tumzy</span>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-item sidebar-item--active">
                    <span class="sidebar-item-name">Main</span>
                    
                </div>
            </nav>
            <div id="user-banning">
                <input type="text" id="user-ban-input">
                <button id="confirm-user-ban">Ban</button>
            </div>
            <div class="sidebar-footer">
                <input type="text" class="sidebar-footer-user" id="my-username" value="" placeholder="User_123">
                <button class="logout-btn" id="rename-btn">Rename</button>
            </div> 
            </aside>

            <div class="chat-window">
            <div class="chat-header">
                <span>Main</span>
                <div class="status-notice-box">
                    <span class="status-icon">⚠️</span>
                    <div class="status-text-content">
                        <span class="status-warning-title">Community Standards</span>
                        <p class="status-warning-detail">Inappropriate messages will be deleted and may result in a permanent account ban.</p>
                    </div>
                </div>
            </div>
            
            <div class="message-list" id="message-list">
                <div id="message-container" class="message-container"></div>
            </div>
            
            <div class="message-input-container">
                <div class="message-input-wrap">
                    <textarea class="message-input" id="message-input" placeholder="Message..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn" disabled="">Send</button>
                </div>
                <span class="char-counter" id="char-counter">0/500</span>
            </div>
            </div>

        </div>
        </div>
   </body>
   <script src="https://unpkg.com/bad-words@3.0.4/lib/bad-words.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <script src="bad_word_handling.js"></script>
   <script src="user_banning.js"></script>
    <script src="app.js"></script>
   <script src="login.js"></script>
</html>
