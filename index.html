<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumzy</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="root">
        <div class="login-page" id="login-page">
            <div id="auth-container">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button id="login-btn">Login</button>
                <button id="signup-btn">Sign Up</button>
            </div>
            <div id="chat-interface" style="display:none;">
                <button id="logout-btn">Logout</button>
            </div>
        </div>
        <div class="chat-layout">
            <button class="hamburger">☰</button>
            
            <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">Tumzy</span>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-item sidebar-item--active">
                <span class="sidebar-item-name"># Global</span>
                </div>
                <!--
                <div class="sidebar-section">
                <div class="sidebar-section-header">
                    <span>Direct Messages</span>
                    <button class="icon-btn" title="New DM">+</button>
                </div>
                </div>
                
                <div class="sidebar-section">
                <div class="sidebar-section-header">
                    <span>Groups</span>
                    <button class="icon-btn" title="Create Group">+</button>
                </div>
                </div>
                --->
            </nav>
            <div id="user-banning">
                <input type="text" id="user-ban-input">
                <button id="confirm-user-ban">Ban</button>
            </div>
            <div class="sidebar-footer">
                
                <input type="text" class="sidebar-footer-user" id="my-username" value="" placeholder="User_123">
                <button class="logout-btn" id="rename-btn">Rename</button>
            </div> 
            </aside>

            <div class="chat-window">
            <div class="chat-header">
                <span># Global</span>
            </div>
            
            <div class="message-list">
                <div id="message-container" class="message-container"></div>
            </div>
            
            <div class="message-input-container">
                <div class="message-input-wrap">
                    <textarea class="message-input" id="message-input" placeholder="Message..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn" disabled="">Send</button>
                </div>
                <span class="char-counter" id="char-counter">0/500</span>
            </div>
            </div>

        </div>
        </div>
   </body>
   <script src="https://unpkg.com/bad-words@3.0.4/lib/bad-words.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <script src="bad_word_handling.js"></script>
   <script src="user_banning.js"></script>
    <script src="app.js"></script>
   <script src="login.js"></script>
</html>
